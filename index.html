<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkNest Legal</title>
<style>
  :root {
    --ink: #1f2d28;
    --muted: #5d736b;
    --leaf: #479987;
    --bg: #fafcfb;
    --card: #ffffff;
    --line: #e3ece8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.6;
  }
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 72px;
  }
  h1 { margin: 0 0 8px; font-size: 30px; }
  p { color: var(--muted); }
  .links {
    display: grid;
    gap: 12px;
    margin-top: 28px;
  }
  a {
    display: block;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 16px;
    color: var(--leaf);
    background: var(--card);
    font-weight: 700;
    text-decoration: none;
  }
  a:hover { border-color: var(--leaf); }
</style>
</head>
<body>
<main>
  <h1>LinkNest Legal</h1>
  <p>Legal documents for the LinkNest mobile app.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </div>
</main>
</body>
</html>
